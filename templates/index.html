<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure Skating Judge Bias Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, button {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        select {
            background: white;
            cursor: pointer;
        }

        select:hover {
            border-color: #667eea;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #888;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .results {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .results h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e0e0e0;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .z-score {
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            min-width: 60px;
            text-align: center;
        }

        .z-positive {
            background: #fee;
            color: #c33;
        }

        .z-negative {
            background: #eef;
            color: #33c;
        }

        .z-neutral {
            background: #f0f0f0;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.2em;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        #chart {
            width: 100%;
            height: 400px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #888;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #667eea;
            transform: none;
            box-shadow: none;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-info {
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 Figure Skating Judge Bias Analysis</h1>
            <p class="subtitle">Statistical analysis of judging patterns using permutation-based peer-median deviation</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="competition">Competition</label>
                <select id="competition">
                    <option value="">Select competition...</option>
                    {% for comp in competitions %}
                    <option value="{{ comp.competition_id }}">{{ comp.name }} ({{ comp.season }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="control-group">
                <label for="event">Event</label>
                <select id="event" disabled>
                    <option value="">Select event...</option>
                </select>
            </div>

            <div class="control-group" style="align-self: flex-end;">
                <button id="analyzeBtn" disabled>Analyze</button>
            </div>
        </div>

        <div id="summaryStats" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="numJudges">-</div>
                    <div class="stat-label">Judges</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="numSkaters">-</div>
                    <div class="stat-label">Skaters</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="numElements">-</div>
                    <div class="stat-label">Elements</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgAbsZ">-</div>
                    <div class="stat-label">Mean |Z-Score|</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="maxZ">-</div>
                    <div class="stat-label">Max Z-Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="minZ">-</div>
                    <div class="stat-label">Min Z-Score</div>
                </div>
            </div>
        </div>

        <div class="results" id="results" style="display: none;">
            <div class="tabs">
                <button class="tab active" data-tab="judges">Judge Statistics</button>
                <button class="tab" data-tab="podium">Podium Analysis</button>
                <button class="tab" data-tab="distribution">Distribution</button>
            </div>

            <div id="judges-tab" class="tab-content active">
                <h2>Judge Bias Statistics</h2>
                <div id="judgeTable"></div>
            </div>

            <div id="podium-tab" class="tab-content">
                <h2>Podium Analysis (Gold vs Silver)</h2>
                <div id="podiumTable"></div>
            </div>

            <div id="distribution-tab" class="tab-content">
                <h2>Z-Score Distribution</h2>
                <div id="distributionChart"></div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentCompetition = null;
        let currentEvent = null;

        // Elements
        const competitionSelect = document.getElementById('competition');
        const eventSelect = document.getElementById('event');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const summaryStats = document.getElementById('summaryStats');
        const results = document.getElementById('results');

        // Event listeners
        competitionSelect.addEventListener('change', onCompetitionChange);
        eventSelect.addEventListener('change', onEventChange);
        analyzeBtn.addEventListener('change', analyze);

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                switchTab(tabName);
            });
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        async function onCompetitionChange() {
            const competitionId = competitionSelect.value;
            currentCompetition = competitionId;

            if (!competitionId) {
                eventSelect.disabled = true;
                eventSelect.innerHTML = '<option value="">Select event...</option>';
                analyzeBtn.disabled = true;
                return;
            }

            // Load events
            const response = await fetch(`/api/events?competition_id=${competitionId}`);
            const events = await response.json();

            eventSelect.innerHTML = '<option value="">All Events</option>';
            events.forEach(event => {
                const option = document.createElement('option');
                option.value = event.event_id;
                option.textContent = `${event.discipline} - ${event.segment}`;
                eventSelect.appendChild(option);
            });

            eventSelect.disabled = false;
            analyzeBtn.disabled = false;
        }

        function onEventChange() {
            currentEvent = eventSelect.value || null;
        }

        async function analyze() {
            if (!currentCompetition) return;

            // Show loading
            results.style.display = 'block';
            summaryStats.style.display = 'block';
            document.getElementById('judgeTable').innerHTML = '<div class="loading">Loading judge statistics</div>';

            // Load judge statistics
            let url = '/api/judge_statistics';
            if (currentEvent) {
                url += `?event_id=${currentEvent}`;
                await loadEventSummary(currentEvent);
            } else {
                url += `?competition_id=${currentCompetition}`;
            }

            const response = await fetch(url);
            const judges = await response.json();

            displayJudgeTable(judges);

            // Load podium analysis if single event selected
            if (currentEvent) {
                loadPodiumAnalysis(currentEvent);
            }
        }

        async function loadEventSummary(eventId) {
            const response = await fetch(`/api/event_summary/${eventId}`);
            const summary = await response.json();

            document.getElementById('numJudges').textContent = summary.num_judges || '-';
            document.getElementById('numSkaters').textContent = summary.num_skaters || '-';
            document.getElementById('numElements').textContent = summary.num_elements || '-';
            document.getElementById('avgAbsZ').textContent = summary.avg_abs_z || '-';
            document.getElementById('maxZ').textContent = summary.max_z || '-';
            document.getElementById('minZ').textContent = summary.min_z || '-';
        }

        function displayJudgeTable(judges) {
            if (!judges.length) {
                document.getElementById('judgeTable').innerHTML = '<p>No data available for this selection.</p>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Position</th>
                            <th>Judge Name</th>
                            <th>Country</th>
                            <th>Event</th>
                            <th>Z-Score</th>
                            <th>Mean Deviation</th>
                            <th>Elements</th>
                            <th>Outliers</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            judges.forEach(judge => {
                const zScore = parseFloat(judge.bias_z_score);
                const zClass = zScore > 0.5 ? 'z-positive' : (zScore < -0.5 ? 'z-negative' : 'z-neutral');
                const zDisplay = zScore.toFixed(2);

                let badge = '';
                if (Math.abs(zScore) > 1.5) {
                    badge = '<span class="badge badge-warning">Notable</span>';
                }
                if (Math.abs(zScore) > 2.0) {
                    badge = '<span class="badge badge-danger">Extreme</span>';
                }

                html += `
                    <tr>
                        <td>${judge.judge_position}</td>
                        <td><strong>${judge.judge_name || 'Unknown'}</strong></td>
                        <td>${judge.judge_country || '-'}</td>
                        <td>${judge.discipline}<br><small style="color: #888;">${judge.segment}</small></td>
                        <td><span class="z-score ${zClass}">${zDisplay}</span>${badge}</td>
                        <td>${judge.mean_goe_deviation ? judge.mean_goe_deviation.toFixed(3) : '-'}</td>
                        <td>${judge.num_elements_judged}</td>
                        <td>${judge.outlier_count} (${judge.outlier_percentage ? judge.outlier_percentage.toFixed(1) : 0}%)</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('judgeTable').innerHTML = html;
        }

        async function loadPodiumAnalysis(eventId) {
            const response = await fetch(`/api/podium_analysis/${eventId}`);
            const data = await response.json();

            if (data.error) {
                document.getElementById('podiumTable').innerHTML = `<p>${data.error}</p>`;
                return;
            }

            const { podium, differentials } = data;

            let html = '<h3>Medal Standings</h3><table><tr><th>Rank</th><th>Skater/Team</th><th>Country</th><th>Score</th></tr>';

            podium.forEach(skater => {
                const medal = skater.rank === 1 ? '🥇' : (skater.rank === 2 ? '🥈' : '🥉');
                html += `
                    <tr>
                        <td>${medal} ${skater.rank}</td>
                        <td><strong>${skater.team_name}</strong></td>
                        <td>${skater.noc}</td>
                        <td>${skater.tss.toFixed(2)}</td>
                    </tr>
                `;
            });

            html += '</table><br><h3>Judge Gold-Silver Differentials</h3>';
            html += '<table><tr><th>Position</th><th>Judge</th><th>Gold GOE</th><th>Silver GOE</th><th>Differential</th></tr>';

            differentials.forEach(diff => {
                const diffClass = diff.differential > 5 ? 'z-positive' : (diff.differential < -5 ? 'z-negative' : 'z-neutral');
                html += `
                    <tr>
                        <td>${diff.judge_position}</td>
                        <td>${diff.judge_name}</td>
                        <td>${diff.gold_goe}</td>
                        <td>${diff.silver_goe}</td>
                        <td><span class="z-score ${diffClass}">${diff.differential > 0 ? '+' : ''}${diff.differential}</span></td>
                    </tr>
                `;
            });

            html += '</table>';
            document.getElementById('podiumTable').innerHTML = html;
        }

        // Auto-load if first competition exists
        window.addEventListener('load', () => {
            if (competitionSelect.options.length > 1) {
                // Auto-select first competition for demo
                // competitionSelect.value = competitionSelect.options[1].value;
                // onCompetitionChange();
            }
        });
    </script>
</body>
</html>
